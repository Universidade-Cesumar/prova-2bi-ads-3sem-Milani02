<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almoxarifado - Controle de Materiais</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Almoxarifado</h1>
    <p>Controle de Materiais</p>
  </header>

  <div class="card">
    <h2>Cadastrar Material</h2>
    <div class="form-row">
      <input type="text"   id="input-nome"        placeholder="Nome do material" />
      <input type="number" id="input-quantidade"   placeholder="Quantidade" min="1" />
      <button type="button" id="btn-cadastrar">Cadastrar</button>
    </div>
    <p class="feedback" id="feedback"></p>
  </div>

  <div class="card">
    <h2>Materiais em Estoque</h2>
    <table id="lista-materiais">
      <thead>
        <tr>
          <th>Material</th>
          <th>Quantidade</th>
        </tr>
      </thead>
      <tbody id="tbody-materiais">
        <tr><td colspan="2" class="loading">Carregando...</td></tr>
      </tbody>
    </table>
  </div>

  <script src="main.js"></script>
</body>
</html>

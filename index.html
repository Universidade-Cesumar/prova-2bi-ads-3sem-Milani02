<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almoxarifado | Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-content">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        <h1>Nexus<span>Almoxarifado</span></h1>
      </div>
      <div class="user-profile">
        <div class="avatar">TJ</div>
      </div>
    </div>
  </header>

  <main class="container">
    
    <section class="card animate-fade-in">
      <div class="card-header">
        <h2>Cadastrar Novo Material</h2>
        <p>Adicione itens ao inventário do sistema</p>
      </div>
      
      <div class="form-row">
        <div class="input-group flex-2">
          <label for="input-nome">Nome do Material</label>
          <input type="text" id="input-nome" placeholder="Ex: Teclado Mecânico" />
        </div>
        <div class="input-group flex-1">
          <label for="input-quantidade">Quantidade Inicial</label>
          <input type="number" id="input-quantidade" placeholder="Ex: 10" min="1" />
        </div>
        <div class="input-group button-group">
          <button type="button" id="btn-cadastrar" class="btn-primary">
            Cadastrar Item
          </button>
        </div>
      </div>
      <div class="feedback" id="feedback"></div>
    </section>

    <section class="card animate-fade-in delay-1">
      <div class="card-header flex-between">
        <div>
          <h2>Materiais em Estoque</h2>
          <p>Gerencie o inventário, realize baixas ou exclusões</p>
        </div>
        
        <div class="dashboard-stats">
          <span class="stat-badge">Total de Itens: <strong id="total-itens">0</strong></span>
        </div>
      </div>

      <div class="toolbar">
        <div class="input-group search-bar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="input-busca" placeholder="Buscar material na lista..." />
        </div>

        <div class="input-group action-bar">
          <input type="number" id="input-retirada" placeholder="Qtd. para retirar" min="1" />
        </div>
      </div>

      <div class="table-container">
        <table id="lista-materiais">
          <thead>
            <tr>
              <th>Descrição do Material</th>
              <th class="text-center">Estoque Atual</th>
              <th class="text-right">Ações Rápidas</th>
            </tr>
          </thead>
          <tbody id="tbody-materiais">
            <tr><td colspan="3" class="empty-state">Carregando dados do servidor...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="main.js"></script>
</body>
</html>
